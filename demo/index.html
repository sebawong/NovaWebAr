<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>WebSLAM Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #ar-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    #ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 16px;
      z-index: 10;
      pointer-events: none;
    }
    #status {
      font-family: 'SF Mono', 'Consolas', monospace;
      font-size: 14px;
      color: #0f0;
      background: rgba(0,0,0,0.6);
      padding: 8px 12px;
      border-radius: 8px;
      display: inline-block;
    }
    #start-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      font-family: system-ui, sans-serif;
      font-size: 18px;
      padding: 16px 32px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      pointer-events: auto;
    }
    #start-btn:hover { background: #e0e0e0; }
  </style>
</head>
<body>
  <div id="ar-container"></div>
  <div id="ui-overlay">
    <div id="status">WebSLAM — Tap to start</div>
  </div>
  <button id="start-btn">Start AR</button>
  <script type="module" src="./main.ts"></script>
</body>
</html>
